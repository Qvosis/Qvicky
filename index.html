<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qvicky Messenger</title>
    
    <!-- Возвращаем старую базу данных Gun.js -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <!-- ZegoCloud для звонков -->
    <script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>
    
    <style>
        :root {
            --primary: #512da8;
            --primary-light: #673ab7;
            --bg-color: #f0f2f5;
            --chat-bg: #e5ddd5;
            --text-dark: #333;
            --text-light: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; max-width: 600px; margin: 0 auto; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; }
        .screen.active { display: flex; }

        header { background: var(--primary); color: var(--text-light); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; font-size: 1.2rem; font-weight: bold; z-index: 10; }
        .back-btn { cursor: pointer; display: flex; align-items: center; font-size: 1rem; }
        .call-btn { background: #4caf50; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        .search-bar { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #ddd; display: flex; gap: 10px; }
        .search-bar input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .search-bar button { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; cursor: pointer; transition: background 0.2s; }
        .contact-item:hover { background: #f1f1f1; }
        .avatar { width: 45px; height: 45px; background: var(--primary-light); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; margin-right: 15px; }
        .contact-info { flex: 1; }
        .contact-name { font-weight: bold; color: var(--text-dark); font-size: 1.1rem; }

        .chat-area { flex: 1; background: var(--chat-bg); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.me { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.other { background: white; color: var(--text-dark); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-time { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; text-align: right; display: block; }

        .input-area { padding: 10px 15px; background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ccc; outline: none; background: #f9f9f9; }
        .input-area button { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }

        .verified::after { content: " ✔"; color: #00bcd4; font-size: 1rem; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-box { background: white; padding: 30px; border-radius: 20px; text-align: center; color: var(--text-dark); width: 90%; max-width: 400px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 1.1rem; text-align: center; }
        .login-box button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }

        #incoming-call-alert { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #323232; color: white; padding: 15px 25px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 3000; align-items: center; gap: 15px; }
        #incoming-call-alert button { border: none; padding: 8px 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        
        #zego-wrapper { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 1500; }
        #zego-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="margin-bottom: 20px;">Qvicky 📱</h1>
        <div class="login-box">
            <h2>Ваш юзернейм</h2>
            <p style="color: #666; font-size: 0.9rem; margin-top: 10px;">Придумайте логин для звонков</p>
            <input type="text" id="my-username" placeholder="@alex">
            <button onclick="initApp()">Войти</button>
        </div>
    </div>

    <div id="incoming-call-alert">
        <span id="caller-name">Входящий...</span>
        <button style="background: #4caf50; color: white;" onclick="answerCall()">Ответить</button>
        <button style="background: #f44336; color: white;" onclick="rejectCall()">Сбросить</button>
    </div>

    <div id="zego-wrapper">
        <div id="zego-container"></div>
    </div>

    <div id="contacts-screen" class="screen">
        <header>
            <span>Контакты</span>
            <span id="my-display-name" style="font-size: 0.9rem; opacity: 0.8;"></span>
        </header>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Найти (напр. @Qvosis)">
            <button onclick="addContact()">Добавить</button>
        </div>
        <div class="contact-list" id="contacts-container"></div>
    </div>

    <div id="chat-screen" class="screen">
        <header>
            <div class="back-btn" onclick="showScreen('contacts-screen')">◀ Назад</div>
            <div id="chat-header-name" class="contact-name">@user</div>
            <button class="call-btn" onclick="startCall()">📞 Видео</button>
        </header>
        <div class="chat-area" id="chat-messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ВСТАВЬ СВОИ ДАННЫЕ ОТ ZEGOCLOUD СЮДА:
        // ==========================================
        const ZEGOCLOUD_APP_ID = 1787230976; // ВАЖНО: Должна быть цифра (без кавычек)
        const ZEGOCLOUD_SERVER_SECRET = "13781fdd5faecce543c56060642fb0b2"; // ВАЖНО: Должна быть строка в кавычках

        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        let myName = "";
        let currentChatUser = "";
        let zegoInstance = null; 
        let incomingRoomID = ""; 
        let incomingCallerName = ""; 
        
        // Подключаем Gun.js сразу с несколькими серверами для надежности
        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://peer.wallie.io/gun',
            'https://gun-vue.js.org/gun'
        ]);

        let localDB = {
            contacts: JSON.parse(localStorage.getItem('qvicky_contacts')) || [],
            messages: JSON.parse(localStorage.getItem('qvicky_messages')) || {}
        };

        function initApp() {
            let input = document.getElementById('my-username').value.trim();
            if (!input) return alert("Введите юзернейм!");
            
            // Чтобы не было путаницы, переводим все юзернеймы в нижний регистр
            myName = input.startsWith('@') ? input.toLowerCase() : '@' + input.toLowerCase();
            
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('my-display-name').innerText = myName;
            
            renderContacts();
            showScreen('contacts-screen');
            listenForNetworkEvents();
        }

        // ==========================================
        // БАЗА ДАННЫХ И СЕТЬ (Gun.js)
        // ==========================================
        function listenForNetworkEvents() {
            let lastMsgId = {};
            let lastCallTime = 0;

            const safeMyName = myName.replace('@', '');

            // 1. Слушаем текстовые сообщения
            gun.get('qvicky_inbox_' + safeMyName).on((data) => {
                if (!data || !data.text || lastMsgId[data.sender] === data.id) return;
                lastMsgId[data.sender] = data.id;
                
                saveMessageLocally(data.sender, data.sender, data.text);
                if (currentChatUser === data.sender) renderChat(currentChatUser);
            });

            // 2. Слушаем звонки
            gun.get('qvicky_call_' + safeMyName).on((data) => {
                if (!data || data.time === lastCallTime) return;
                lastCallTime = data.time;

                const alertBox = document.getElementById('incoming-call-alert');
                
                if (data.status === 'ringing') {
                    incomingRoomID = data.roomID;
                    incomingCallerName = data.initiator;
                    document.getElementById('caller-name').innerText = `Звонок от ${data.initiator}`;
                    alertBox.style.display = 'flex';
                } 
                else if (data.status === 'ended') {
                    alertBox.style.display = 'none';
                    if (zegoInstance) closeZegoUI();
                }
            });
        }

        // ==========================================
        // ZEGOCLOUD (УМНАЯ ЛОГИКА ЗВОНКОВ)
        // ==========================================
        function startZegoCall(roomID) {
            try {
                // Проверка на частую ошибку с ключами
                if (ZEGOCLOUD_APP_ID === 0 || ZEGOCLOUD_SERVER_SECRET === "ТВОЙ_СЕКРЕТ") {
                    alert("ОШИБКА: Ты не вставил ключи ZegoCloud в код!");
                    return false;
                }
                
                // Проверка на протокол (камера не включится без HTTPS или Localhost)
                if (window.location.protocol === 'file:') {
                    alert("ОШИБКА: Камера не работает при открытии файла напрямую. Загрузи сайт на Glitch.com или используй локальный сервер (Live Server).");
                    return false;
                }

                const wrapper = document.getElementById('zego-wrapper');
                wrapper.style.display = 'block';

                const kitToken = ZegoUIKitPrebuilt.generateKitTokenForTest(
                    ZEGOCLOUD_APP_ID, 
                    ZEGOCLOUD_SERVER_SECRET, 
                    roomID, 
                    myName, 
                    myName 
                );

                zegoInstance = ZegoUIKitPrebuilt.create(kitToken);
                zegoInstance.joinRoom({
                    container: document.getElementById('zego-container'),
                    scenario: { mode: ZegoUIKitPrebuilt.OneONoneCall },
                    showPreJoinView: false,
                    
                    onLeaveRoom: () => {
                        closeZegoUI();
                        const targetUser = currentChatUser || incomingCallerName;
                        if (targetUser) {
                            const targetSafeId = targetUser.replace('@', '');
                            gun.get('qvicky_call_' + targetSafeId).put({ status: 'ended', time: Date.now() });
                        }
                    }
                });
                return true;
            } catch (error) {
                alert("Критическая ошибка при запуске камеры. Убедись, что AppID написан без кавычек. Текст ошибки: " + error.message);
                closeZegoUI();
                return false;
            }
        }

        function closeZegoUI() {
            document.getElementById('zego-wrapper').style.display = 'none';
            if (zegoInstance) {
                zegoInstance.destroy();
                zegoInstance = null;
            }
        }

        // Я нажимаю кнопку "Позвонить"
        function startCall() {
            if (!currentChatUser) return;
            
            const roomID = 'room_' + myName.replace('@', '');
            
            // Пытаемся запустить звонок у себя
            const isCallStarted = startZegoCall(roomID);

            // Если камера успешно включилась, шлем сигнал другу
            if (isCallStarted) {
                const targetSafeId = currentChatUser.replace('@', '');
                gun.get('qvicky_call_' + targetSafeId).put({
                    initiator: myName,
                    roomID: roomID,
                    status: 'ringing',
                    time: Date.now()
                });
            }
        }

        // Я отвечаю на вызов
        function answerCall() {
            document.getElementById('incoming-call-alert').style.display = 'none';
            currentChatUser = incomingCallerName; 
            startZegoCall(incomingRoomID); 
        }

        // Я сбрасываю вызов
        function rejectCall() {
            document.getElementById('incoming-call-alert').style.display = 'none';
            const targetSafeId = incomingCallerName.replace('@', '');
            gun.get('qvicky_call_' + targetSafeId).put({ status: 'ended', time: Date.now() });
        }

        // ==========================================
        // ЛОГИКА ЧАТА И КОНТАКТОВ
        // ==========================================
        function saveMessageLocally(chatWith, sender, text) {
            if (!localDB.messages[chatWith]) localDB.messages[chatWith] = [];
            localDB.messages[chatWith].push({
                sender: sender, text: text,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            localStorage.setItem('qvicky_messages', JSON.stringify(localDB.messages));
        }

        function addContact() {
            let input = document.getElementById('search-input').value.trim();
            if (!input) return;
            
            let targetUser = input.startsWith('@') ? input.toLowerCase() : '@' + input.toLowerCase();
            
            if (targetUser === myName) return alert("Это ваш юзернейм!");
            if (localDB.contacts.includes(targetUser)) return alert("Уже в контактах!");

            localDB.contacts.push(targetUser);
            localStorage.setItem('qvicky_contacts', JSON.stringify(localDB.contacts));
            document.getElementById('search-input').value = '';
            renderContacts();
        }

        function renderContacts() {
            const container = document.getElementById('contacts-container');
            container.innerHTML = '';
            localDB.contacts.forEach(user => {
                const isVerified = user === "@qvosis" ? ' verified' : '';
                const initial = user.charAt(1).toUpperCase();
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.onclick = () => openChat(user);
                div.innerHTML = `<div class="avatar">${initial}</div><div class="contact-info"><div class="contact-name${isVerified}">${user}</div></div>`;
                container.appendChild(div);
            });
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function openChat(user) {
            currentChatUser = user;
            const isVerified = user === "@qvosis" ? ' verified' : '';
            document.getElementById('chat-header-name').innerHTML = `<span class="${isVerified}">${user}</span>`;
            renderChat(user);
            showScreen('chat-screen');
        }

        function renderChat(user) {
            const chatArea = document.getElementById('chat-messages');
            chatArea.innerHTML = '';
            const history = localDB.messages[user] || [];
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg ${msg.sender === myName ? 'me' : 'other'}`;
                div.innerHTML = `${msg.text} <span class="msg-time">${msg.time}</span>`;
                chatArea.appendChild(div);
            });
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !currentChatUser) return;

            saveMessageLocally(currentChatUser, myName, text);
            renderChat(currentChatUser);
            input.value = '';

            const targetSafeId = currentChatUser.replace('@', '');
            gun.get('qvicky_inbox_' + targetSafeId).put({
                sender: myName,
                text: text,
                id: Date.now()
            });
        }
    </script>
</body>
</html>
