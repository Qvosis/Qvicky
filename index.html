<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qvicky Messenger</title>
    
    <!-- Подключаем PeerJS для P2P сети (прямое соединение по юзернейму) -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --primary: #512da8;
            --primary-light: #673ab7;
            --bg-color: #f0f2f5;
            --chat-bg: #e5ddd5;
            --text-dark: #333;
            --text-light: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Экраны */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; max-width: 600px; margin: 0 auto; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .screen.active { display: flex; }

        /* Шапка */
        header { background: var(--primary); color: var(--text-light); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; font-size: 1.2rem; font-weight: bold; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .back-btn { cursor: pointer; display: flex; align-items: center; font-size: 1rem; }
        .call-btn { background: #4caf50; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        /* Поиск и Контакты */
        .search-bar { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #ddd; display: flex; gap: 10px; }
        .search-bar input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .search-bar button { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; cursor: pointer; transition: background 0.2s; }
        .contact-item:hover { background: #f1f1f1; }
        .avatar { width: 45px; height: 45px; background: var(--primary-light); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; margin-right: 15px; }
        .contact-info { flex: 1; }
        .contact-name { font-weight: bold; color: var(--text-dark); font-size: 1.1rem; }

        /* Чат */
        .chat-area { flex: 1; background: var(--chat-bg); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.me { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.other { background: white; color: var(--text-dark); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-time { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; text-align: right; display: block; }

        .input-area { padding: 10px 15px; background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ccc; outline: none; background: #f9f9f9; }
        .input-area button { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }

        /* Галочка */
        .verified::after { content: " ✔"; color: #00bcd4; font-size: 1rem; }

        /* Звонки (Модальное окно) */
        #call-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        video { width: 100%; max-width: 400px; border-radius: 15px; background: #222; margin-bottom: 20px; object-fit: cover; }
        #local-video { width: 100px; position: absolute; bottom: 30px; right: 20px; border: 2px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .call-actions { display: flex; gap: 20px; position: absolute; bottom: 40px; }
        .btn-call-end { background: #f44336; border: none; color: white; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-call-answer { background: #4caf50; border: none; color: white; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* Экран входа */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-box { background: white; padding: 30px; border-radius: 20px; text-align: center; color: var(--text-dark); width: 90%; max-width: 400px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 1.1rem; text-align: center; }
        .login-box button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-overlay">
        <h1 style="margin-bottom: 20px;">Qvicky 📱</h1>
        <div class="login-box">
            <h2>Ваш юзернейм</h2>
            <p style="color: #666; font-size: 0.9rem; margin-top: 10px;">Придумайте логин, по которому вас будут находить друзья</p>
            <input type="text" id="my-username" placeholder="@alex">
            <button onclick="initApp()">Войти</button>
        </div>
    </div>

    <!-- ЭКРАН КОНТАКТОВ -->
    <div id="contacts-screen" class="screen">
        <header>
            <span>Контакты</span>
            <span id="my-display-name" style="font-size: 0.9rem; opacity: 0.8;"></span>
        </header>
        
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Поиск по юзернейму (напр. @Qvosis)">
            <button onclick="addContact()">Добавить</button>
        </div>

        <div class="contact-list" id="contacts-container">
            <!-- Список контактов генерируется JS -->
        </div>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat-screen" class="screen">
        <header>
            <div class="back-btn" onclick="showScreen('contacts-screen')">◀ Назад</div>
            <div id="chat-header-name" class="contact-name">@user</div>
            <button class="call-btn" onclick="startCall()">📞</button>
        </header>
        
        <div class="chat-area" id="chat-messages">
            <!-- Сообщения -->
        </div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Написать сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ЗВОНКА -->
    <div id="call-modal">
        <h2 id="call-status" style="position: absolute; top: 40px;">Звонок...</h2>
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        
        <div class="call-actions" id="incoming-actions" style="display: none;">
            <button class="btn-call-end" onclick="rejectCall()">Отклонить</button>
            <button class="btn-call-answer" onclick="answerCall()">Ответить</button>
        </div>
        
        <div class="call-actions" id="active-actions">
            <button class="btn-call-end" onclick="endCall()">Завершить звонок</button>
        </div>
    </div>

    <script>
        // --- 1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        let myName = "";
        let currentChatUser = "";
        let peer = null;
        let currentCall = null;
        let localStream = null;

        // База данных в LocalStorage
        let db = {
            contacts: JSON.parse(localStorage.getItem('qvicky_contacts')) || [],
            messages: JSON.parse(localStorage.getItem('qvicky_messages')) || {}
        };

        // --- 2. ИНИЦИАЛИЗАЦИЯ И СЕТЬ (PeerJS) ---
        function initApp() {
            let input = document.getElementById('my-username').value.trim();
            if (!input) return alert("Введите юзернейм!");
            
            // Форматируем юзернейм
            myName = input.startsWith('@') ? input : '@' + input;
            
            // Скрываем экран входа
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('my-display-name').innerText = myName;
            
            // Создаем уникальный ID для сети (убираем @ для системного ID)
            const peerId = 'qvicky-' + myName.substring(1).toLowerCase();
            
            peer = new Peer(peerId);

            peer.on('open', (id) => {
                console.log('Подключено к сети как: ' + id);
                renderContacts();
                showScreen('contacts-screen');
            });

            // Обработка ВХОДЯЩИХ сообщений
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    saveMessage(data.sender, data.sender, data.text);
                    if (currentChatUser === data.sender) renderChat(currentChatUser);
                });
            });

            // Обработка ВХОДЯЩЕГО звонка
            peer.on('call', (call) => {
                currentCall = call;
                document.getElementById('call-modal').style.display = 'flex';
                document.getElementById('call-status').innerText = `Входящий от @${call.peer.split('-')[1]}`;
                document.getElementById('incoming-actions').style.display = 'flex';
                document.getElementById('active-actions').style.display = 'none';
                
                // Получаем свою камеру заранее
                navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                    localStream = stream;
                    document.getElementById('local-video').srcObject = stream;
                });
            });
        }

        // --- 3. ЛОГИКА КОНТАКТОВ (База данных) ---
        function addContact() {
            let input = document.getElementById('search-input').value.trim();
            if (!input) return;
            let targetUser = input.startsWith('@') ? input : '@' + input;
            
            if (targetUser === myName) return alert("Нельзя добавить самого себя!");
            if (db.contacts.includes(targetUser)) return alert("Контакт уже в списке!");

            db.contacts.push(targetUser);
            localStorage.setItem('qvicky_contacts', JSON.stringify(db.contacts));
            
            document.getElementById('search-input').value = '';
            renderContacts();
        }

        function renderContacts() {
            const container = document.getElementById('contacts-container');
            container.innerHTML = '';
            
            db.contacts.forEach(user => {
                const isVerified = user === "@Qvosis" ? ' verified' : '';
                const initial = user.charAt(1).toUpperCase();
                
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.onclick = () => openChat(user);
                div.innerHTML = `
                    <div class="avatar">${initial}</div>
                    <div class="contact-info">
                        <div class="contact-name${isVerified}">${user}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- 4. ЛОГИКА ЧАТА ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function openChat(user) {
            currentChatUser = user;
            const isVerified = user === "@Qvosis" ? ' verified' : '';
            document.getElementById('chat-header-name').innerHTML = `<span class="${isVerified}">${user}</span>`;
            renderChat(user);
            showScreen('chat-screen');
        }

        function saveMessage(chatWith, sender, text) {
            if (!db.messages[chatWith]) db.messages[chatWith] = [];
            db.messages[chatWith].push({
                sender: sender,
                text: text,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            localStorage.setItem('qvicky_messages', JSON.stringify(db.messages));
        }

        function renderChat(user) {
            const chatArea = document.getElementById('chat-messages');
            chatArea.innerHTML = '';
            
            const history = db.messages[user] || [];
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg ${msg.sender === myName ? 'me' : 'other'}`;
                div.innerHTML = `${msg.text} <span class="msg-time">${msg.time}</span>`;
                chatArea.appendChild(div);
            });
            
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !currentChatUser) return;

            // Сохраняем и показываем у себя
            saveMessage(currentChatUser, myName, text);
            renderChat(currentChatUser);
            input.value = '';

            // Отправляем по сети (P2P)
            const targetPeerId = 'qvicky-' + currentChatUser.substring(1).toLowerCase();
            const conn = peer.connect(targetPeerId);
            conn.on('open', () => {
                conn.send({ sender: myName, text: text });
            });
        }

        // --- 5. ЗВОНКИ ЧЕРЕЗ WEBRTC (PEERJS) ---
        function startCall() {
            if (!currentChatUser) return;
            
            document.getElementById('call-modal').style.display = 'flex';
            document.getElementById('call-status').innerText = 'Звоним...';
            document.getElementById('incoming-actions').style.display = 'none';
            document.getElementById('active-actions').style.display = 'flex';

            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
                
                const targetPeerId = 'qvicky-' + currentChatUser.substring(1).toLowerCase();
                currentCall = peer.call(targetPeerId, stream);
                
                currentCall.on('stream', remoteStream => {
                    document.getElementById('call-status').innerText = '';
                    document.getElementById('remote-video').srcObject = remoteStream;
                });

                currentCall.on('close', closeCallUI);
            }).catch(err => {
                alert("Ошибка доступа к камере/микрофону: " + err);
                closeCallUI();
            });
        }

        function answerCall() {
            document.getElementById('incoming-actions').style.display = 'none';
            document.getElementById('active-actions').style.display = 'flex';
            document.getElementById('call-status').innerText = '';

            currentCall.answer(localStream);
            currentCall.on('stream', remoteStream => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
            currentCall.on('close', closeCallUI);
        }

        function rejectCall() {
            if (currentCall) currentCall.close();
            closeCallUI();
        }

        function endCall() {
            if (currentCall) currentCall.close();
            closeCallUI();
        }

        function closeCallUI() {
            document.getElementById('call-modal').style.display = 'none';
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            document.getElementById('local-video').srcObject = null;
            document.getElementById('remote-video').srcObject = null;
            currentCall = null;
        }
    </script>
</body>
</html>
